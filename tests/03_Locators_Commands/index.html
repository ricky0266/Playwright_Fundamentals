<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #fff;
            padding: 30px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #6c5ce7;
        }

        .forgot {
            display: block;
            margin-bottom: 15px;
            color: #6c5ce7;
            font-size: 13px;
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .captcha {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .captcha input {
            width: 18px;
            height: 18px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #444;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #6c5ce7;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a4bd1;
        }
    </style>

</head>

<body>

    <div class="login-container">
        <h1>Welcome to the app.vwo.com : Login</h1>

        <form>

            <label>Username</label>
            <input type="email" placeholder="admin@admin.com">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <a href="#" class="forgot">Forgot Password?</a>



            <div class="remember">
                <input type="checkbox">
                <span>Remember me</span>
            </div>

            <button type="submit">Sign in</button>

        </form>
    </div>

</body>

</html>
